appId: com.hebert.ctrlcusto
---
# Pressupõe que o usuário já está logado (fluxo: login.yaml)
- runFlow: login.yaml

# Verifica componentes do dashboard
- assertVisible:
    text: "Saldo"
- assertVisible:
    text: "Receitas"
- assertVisible:
    text: "Despesas"

# Aba "Transações" na tab bar
- tapOn:
    text: "Transações"
- assertVisible:
    text: "Transações"

# Volta para o dashboard
- tapOn:
    text: "Início"
- assertVisible:
    text: "Saldo"
