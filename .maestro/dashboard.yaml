appId: com.hebert.ctrlcusto
---
- runFlow: login.yaml

# Verifica hero card "Fluxo do Mês"
- assertVisible:
    text: "Fluxo do Mês"
- assertVisible:
    text: "Receitas"
- assertVisible:
    text: "Despesas"

# Expande o hero card para ver o donut
- tapOn:
    text: "Fluxo do Mês"
- assertVisible:
    text: "Receitas vs Despesas"

# Fecha o donut tocando novamente
- tapOn:
    text: "Fluxo do Mês"

# Verifica card "Saldo nos Bancos"
- assertVisible:
    text: "Saldo nos Bancos"

# Expande o card de bancos
- tapOn:
    text: "Saldo nos Bancos"

# Verifica seção de últimas transações
- assertVisible:
    text: "Últimas transações"

# Navega para aba Transações
- tapOn:
    text: "Transações"
- assertVisible:
    text: "Transações"

# Volta para o Dashboard
- tapOn:
    text: "Dashboard"
- assertVisible:
    text: "Fluxo do Mês"
