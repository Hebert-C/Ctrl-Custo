# /etc/fail2ban/filter.d/ctrl-custo-api.conf
# Reads nginx access log — detect brute force on /api/auth/login
# Nginx combined log format: <IP> - - [date] "METHOD path HTTP/x" STATUS ...

[Definition]
failregex = ^<HOST> .* "POST /api/auth/login HTTP/[0-9.]+" 401
            ^<HOST> .* "POST /api/auth/login HTTP/[0-9.]+" 429

ignoreregex =
